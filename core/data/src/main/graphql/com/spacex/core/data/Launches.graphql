query GetPastLaunches {
    launchesPast(limit: 200) {
        id
        mission_name
        launch_date_utc
        launch_success
        details

        # Nested Object: ROCKET
        rocket {
            rocket_name
            rocket {
                id
            }
        }

        # Nested Object: LINKS
        links {
            mission_patch
            mission_patch_small
            video_link
            article_link
            wikipedia
            flickr_images
        }
    }
}
